<!DOCTYPE html>
<html lang="nl" data-theme="light">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inloggen – ZonneStrand</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-page">
<div class="ocean-bg" aria-hidden="true">
    <div class="wave wave1"></div><div class="wave wave2"></div><div class="wave wave3"></div>
</div>
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">🏖️</div>
            <h1 class="auth-title">ZonneStrand<span class="brand-accent">NL</span></h1>
            <p class="auth-subtitle">Verhuur systeem · Seizoen 2026</p>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}{% for cat, msg in messages %}
          <div class="inline-alert alert-{{ cat }}">{{ msg }}</div>
          {% endfor %}{% endif %}
        {% endwith %}
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label>Gebruikersnaam</label>
                <input type="text" name="username" placeholder="Jouw gebruikersnaam" required autofocus>
            </div>
            <div class="form-group">
                <label>Wachtwoord</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full" style="margin-top:.5rem">Inloggen →</button>
        </form>
        <p class="auth-switch">Nog geen account? <a href="/register">Registreren</a></p>
    </div>
</div>
<script src="/static/script.js"></script>
</body></html>
