<!DOCTYPE html>
<html lang="nl" data-theme="light">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inloggen – ZonneStrand</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-body">
<div class="ocean-bg" aria-hidden="true">
    <div class="wave w1"></div><div class="wave w2"></div><div class="wave w3"></div>
</div>
<div class="auth-scene">
    <div class="auth-card">
        <div class="auth-card-top">
            <div class="auth-emblem">🏖</div>
            <h1 class="auth-title">ZonneStrand<span class="brand-accent"> Verhuur</span></h1>
            <p class="auth-sub">Welkom terug — log in om te beginnen</p>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}{% for cat, msg in messages %}
          <div class="alert alert-{{ cat }}">{{ msg }}</div>
          {% endfor %}{% endif %}
        {% endwith %}
        <form method="POST" class="auth-form">
            <div class="field-group">
                <label>Gebruikersnaam</label>
                <input type="text" name="username" placeholder="Jouw naam" required autofocus>
            </div>
            <div class="field-group">
                <label>Wachtwoord</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg">Inloggen →</button>
        </form>
        <p class="auth-footer-link">Nog geen account? <a href="/register">Registreer gratis</a></p>
    </div>
</div>
<script src="/static/script.js"></script>
</body></html>
