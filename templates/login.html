<!DOCTYPE html>
<html lang="nl" data-theme="light">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inloggen – ZonneStrand</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-body">
<div class="grain-overlay" aria-hidden="true"></div>
<div class="ambient-bg" aria-hidden="true">
    <div class="ambient-orb orb-1"></div><div class="ambient-orb orb-2"></div>
</div>
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-emblem">🏖️</div>
        <h1 class="auth-heading">ZonneStrand Verhuur</h1>
        <p class="auth-subheading">Welkom terug — log in om verder te gaan</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}{% for cat, msg in messages %}
          <div class="alert alert-{{ cat }}">{{ msg }}</div>
          {% endfor %}{% endif %}
        {% endwith %}
        <form method="POST" class="auth-form">
            <div class="field">
                <label class="field-label">Gebruikersnaam</label>
                <input type="text" name="username" class="field-control" placeholder="Jouw naam" required autofocus>
            </div>
            <div class="field">
                <label class="field-label">Wachtwoord</label>
                <input type="password" name="password" class="field-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:.5rem">Inloggen →</button>
        </form>
        <p class="auth-switch">Nog geen account? <a href="/register">Registreer gratis</a></p>
    </div>
</div>
<script src="/static/script.js"></script>
</body></html>
