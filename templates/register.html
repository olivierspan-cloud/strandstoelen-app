<!DOCTYPE html>
<html lang="nl" data-theme="light">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registreren – ZonneStrand</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-body">
<div class="grain" aria-hidden="true"></div>
<div class="auth-deco" aria-hidden="true"></div>
<div class="auth-deco-wave" aria-hidden="true">
    <svg viewBox="0 0 1440 200" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">
        <path d="M0,100 C240,50 480,150 720,100 C960,50 1200,140 1440,100 L1440,200 L0,200 Z"
              fill="rgba(95,168,154,.25)"/>
        <path d="M0,130 C300,80 600,160 900,120 C1200,80 1350,150 1440,130 L1440,200 L0,200 Z"
              fill="rgba(45,122,110,.18)"/>
    </svg>
</div>
<div class="grain-overlay" aria-hidden="true"></div>
<div class="ambient-bg" aria-hidden="true">
    <div class="ambient-orb orb-1"></div><div class="ambient-orb orb-2"></div>
</div>
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-emblem">🪑</div>
        <h1 class="auth-heading">Account aanmaken</h1>
        <p class="auth-subheading">Gratis registreren · Meteen huren</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}{% for cat, msg in messages %}
          <div class="alert alert-{{ cat }}">{{ msg }}</div>
          {% endfor %}{% endif %}
        {% endwith %}
        <form method="POST" class="auth-form">
            <div class="field">
                <label class="field-label">Gebruikersnaam <span class="field-hint">min. 3 tekens</span></label>
                <input type="text" name="username" class="field-control" placeholder="Kies een naam" required minlength="3" maxlength="30" autofocus>
            </div>
            <div class="field">
                <label class="field-label">Wachtwoord <span class="field-hint">min. 4 tekens</span></label>
                <input type="password" name="password" class="field-control" placeholder="Kies een wachtwoord" required minlength="4">
            </div>
            <div class="field">
                <label class="field-label">Bevestig wachtwoord</label>
                <input type="password" name="confirm" class="field-control" placeholder="Herhaal wachtwoord" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:.5rem">Account aanmaken →</button>
        </form>
        <p class="auth-switch">Al een account? <a href="/login">Inloggen</a></p>
    </div>
</div>
<script src="/static/script.js"></script>
</body></html>
